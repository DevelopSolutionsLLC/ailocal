# Codex CLI configuration — ailocal LiteLLM proxy
#
# Install:
#   mkdir -p ~/.codex
#   cp config/clients/codex-config.toml ~/.codex/config.toml
#
# Set your key (Codex reads it from the environment):
#   export LITELLM_MASTER_KEY=$(grep LITELLM_MASTER_KEY .env | cut -d= -f2)
#   # Or add to ~/.zshrc / ~/.bash_profile
#
# Switch roles at runtime:
#   codex --model coder       # implementation tasks (default)
#   codex --model reasoner    # deep planning / decomposition
#   codex --model router      # fast, lightweight tasks
#   codex --model supervisor  # review and approval

model          = "coder"
model_provider = "ailocal"

# Reasoning effort sent in each Responses API request.
# medium is the right default for coding tasks (coder/router roles).
# Override per-session with: codex --reasoning-effort high
model_reasoning_effort = "medium"

# Our Ollama models emit reasoning inside <think> tags, not as OpenAI-style
# reasoning summaries. Disable summary parsing to avoid display noise.
model_supports_reasoning_summaries = false
model_reasoning_summary = "none"

[model_providers.ailocal]
name     = "ailocal (LiteLLM)"
base_url = "http://localhost:4000"
env_key  = "LITELLM_MASTER_KEY"
# Codex queries GET /v1/models from base_url automatically for OpenAI-compatible
# providers — no model_catalog_json needed. LiteLLM serves the full model list
# including all role names and aliases at that endpoint.
