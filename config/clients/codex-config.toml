# Route all Codex requests through the local LiteLLM proxy.
# Requires: export LITELLM_MASTER_KEY=<value from .env>
#
# Switch model per-session: codex --model <name>
# Valid models: coder | reasoner | router | supervisor

# Top-level keys must come before any [section] headers in TOML
model_provider     = "ailocal"
model              = "coder"
# Injected by scripts/install-clients.sh — do not hardcode a user path here.
# Run:  ./scripts/install-clients.sh
model_catalog_json = "${HOME}/.codex/model_catalog.json"

# Never prompt for approval — equivalent of --full-auto on the command line.
# Valid values: "untrusted" | "on-failure" | "on-request" | "granular" | "never"
approval_policy = "never"

# Disable the macOS sandbox. Required for local stack (Docker socket, Ollama).
# Valid values: "workspace-only" (default) | "danger-full-access"
sandbox_policy  = "danger-full-access"

model_reasoning_effort             = "medium"
model_supports_reasoning_summaries = false
model_reasoning_summary            = "none"

# Add your own project trust entry after copying to ~/.codex/config.toml:
# [projects."/absolute/path/to/your/repo"]
# trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 1

[model_providers.ailocal]
name     = "ailocal (LiteLLM)"
base_url = "http://localhost:4000/v1"
env_key  = "LITELLM_KEY"
