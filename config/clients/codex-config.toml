[projects."/Users/vtchevalier/Documents/DevelopSolutions/ailocal"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 1

# Route all Codex requests through the local LiteLLM proxy.
# Requires: export LITELLM_MASTER_KEY=<value from .env>
#
# Switch model per-session: codex --model reasoner
# Valid models: coder | reasoner | router | supervisor

model_provider = "ailocal"
model          = "coder"

model_reasoning_effort             = "medium"
model_supports_reasoning_summaries = false
model_reasoning_summary            = "none"

[model_providers.ailocal]
name     = "ailocal (LiteLLM)"
base_url = "http://localhost:4000/v1"
env_key  = "LITELLM_MASTER_KEY"
