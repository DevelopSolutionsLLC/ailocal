[paths]
data     = /var/lib/grafana
logs     = /var/log/grafana
plugins  = /var/lib/grafana/plugins

[server]
http_addr = 0.0.0.0
http_port = 3000

[security]
admin_user = admin
# Password is set via GF_SECURITY_ADMIN_PASSWORD environment variable (docker-compose.yml).
# Do NOT set admin_password here — the ini value overrides the env var.

[auth.anonymous]
enabled  = true
org_role = Viewer
