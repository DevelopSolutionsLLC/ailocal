# profile: 128gb
# Models sized for 128 GB unified memory.
# NOTE: the 6-chat-role split below is sized by analogy to the old 4-role 128gb
# profile — it is UNVERIFIED on real 128 GB hardware. Confirm before switching to
# this profile. The 64gb profile is the validated one.
# supervisor bf16 (64 GB) + coder-main (18 GB) both stay loaded; deep-think-more
# 70B (42 GB) loads alongside supervisor with OLLAMA_MAX_LOADED_MODELS=2.
# Approximate download: ~150 GB
# Run ./scripts/sync-models.sh after any manual change.

disk_gb: 150

coder-main:
  backend: qwen3-coder:30b
  description: Primary repository coding — MoE ~3B active / 30B total
  context_window: 262144
  num_ctx: 262144
  persona: true

coder-agent:
  backend: qwen3.6:35b-mlx
  description: Multi-step planning and agentic orchestration — MoE, multimodal
  context_window: 262144
  num_ctx: 262144
  vision: true
  persona: true

coder-fast:
  backend: qwen2.5-coder:3b
  description: IDE autocomplete (FIM) and fast chat — small, low-latency
  context_window: 32768
  num_ctx: 32768

deep-think:
  backend: deepseek-r1:32b
  description: Chain-of-thought reasoning — full 32B distill
  context_window: 131072
  num_ctx: 131072
  reasoning: true
  merge: true
  persona: true

deep-think-more:
  backend: deepseek-r1:70b
  description: Deepest reasoning — full-size 70B CoT model, 42 GB
  context_window: 131072
  num_ctx: 131072
  reasoning: true
  merge: true
  persona: true

supervisor:
  backend: gemma4:31b-mlx-bf16
  description: Review, critique, approval gate — full bf16 precision, multimodal
  context_window: 131072
  num_ctx: 131072
  vision: true
  persona: true

embed:
  backend: nomic-embed-text
  description: Semantic retrieval and memory — not for chat
  context_window: 8192
