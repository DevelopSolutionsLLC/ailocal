# profile: 32gb
# Models sized for 32 GB unified memory.
# NOTE: the 6-chat-role split below is sized by analogy to the old 4-role 32gb
# profile — it is UNVERIFIED on real 32 GB hardware. Confirm backends/ctx before
# switching to this profile. The 64gb profile is the validated one.
# coder-main (18 GB) + coder-agent (21 GB) hot-swap (OLLAMA_MAX_LOADED_MODELS).
# deep-think (5 GB) / deep-think-more (9 GB) can coexist with supervisor (17 GB).
# Approximate download: ~60 GB
# Run ./scripts/sync-models.sh after any manual change.

disk_gb: 60

coder-main:
  backend: qwen3-coder:30b
  description: Primary repository coding — MoE ~3B active / 30B total
  context_window: 131072
  num_ctx: 131072
  persona: true

coder-agent:
  backend: qwen3.6:35b-mlx
  description: Multi-step planning and agentic orchestration — MoE, multimodal
  context_window: 131072
  num_ctx: 131072
  vision: true
  persona: true

coder-fast:
  backend: qwen2.5-coder:3b
  description: IDE autocomplete (FIM) and fast chat — small, low-latency
  context_window: 32768
  num_ctx: 32768

deep-think:
  backend: deepseek-r1:8b
  description: Lighter chain-of-thought reasoning — auto-MLX via Ollama 0.19+
  context_window: 32768
  num_ctx: 32768
  reasoning: true
  merge: true
  persona: true

deep-think-more:
  backend: deepseek-r1:14b
  description: Deeper reasoning — fits alongside supervisor (17+9=26 GB)
  context_window: 131072
  num_ctx: 131072
  reasoning: true
  merge: true
  persona: true

supervisor:
  backend: gemma4:27b
  description: Review, critique, approval gate — multimodal
  context_window: 131072
  num_ctx: 131072
  vision: true
  persona: true

embed:
  backend: nomic-embed-text
  description: Semantic retrieval and memory — not for chat
  context_window: 8192
