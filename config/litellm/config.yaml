# LiteLLM Proxy Configuration for ailocal
# Role-based routing — clients use ONLY these role names: router | reasoner | coder | supervisor | embed
# All backend model details are hidden behind roles. No direct model names are exposed externally.
#
# Required env vars (set in .env, passed via docker-compose):
#   LITELLM_MASTER_KEY  — auth key for the proxy (sk-... format)
#   DATABASE_URL        — postgres connection string
#   OLLAMA_URL          — http://host.docker.internal:11434
#   REDIS_PASSWORD      — redis auth password

model_list:

  # router — lightweight classifier and fast-response role
  # qwen3:8b: tools + thinking tags confirmed on Ollama Hub; 40K context window
  - model_name: router
    litellm_params:
      model: ollama/qwen3:8b
      api_base: os.environ/OLLAMA_URL
      num_ctx: 32768
    model_info:
      supports_function_calling: true
      supports_tool_choice: true
      supports_parallel_function_calling: true
      supports_system_messages: true
      supports_native_streaming: true
      supports_reasoning: true
      max_tokens: 32768

  # reasoner — deep planning and decomposition role
  # deepseek-r1:32b: tools + thinking tags confirmed on Ollama Hub; 32K context window
  # parallel_function_calling false — reasoning models emit tool calls serially by design
  - model_name: reasoner
    litellm_params:
      model: ollama/deepseek-r1:32b
      api_base: os.environ/OLLAMA_URL
      num_ctx: 32768
    model_info:
      supports_function_calling: true
      supports_tool_choice: true
      supports_parallel_function_calling: false
      supports_system_messages: true
      supports_native_streaming: true
      supports_reasoning: true
      max_tokens: 32768

  # coder — implementation and generation role
  # qwen3.6:27b: tools + thinking + vision tags; 32K+ context window
  - model_name: coder
    litellm_params:
      model: ollama/qwen3.6:27b
      api_base: os.environ/OLLAMA_URL
      num_ctx: 32768
    model_info:
      supports_function_calling: true
      supports_tool_choice: true
      supports_parallel_function_calling: true
      supports_system_messages: true
      supports_native_streaming: true
      supports_reasoning: true
      max_tokens: 32768

  # supervisor — review, critique, and approval gate role
  # glm-4.7-flash: tools + thinking tags confirmed; 198K context window
  - model_name: supervisor
    litellm_params:
      model: ollama/glm-4.7-flash
      api_base: os.environ/OLLAMA_URL
      num_ctx: 65536
    model_info:
      supports_function_calling: true
      supports_tool_choice: true
      supports_parallel_function_calling: true
      supports_system_messages: true
      supports_native_streaming: true
      supports_reasoning: true
      max_tokens: 65536

  # embed — semantic retrieval and memory only; NOT a chat model
  # nomic-embed-text: embedding-only, 8192 token limit
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_URL
      num_ctx: 8192
    model_info:
      mode: embedding
      max_tokens: 8192

router_settings:
  routing_strategy: least-busy
  num_retries: 2
  timeout: 300
  enable_pre_call_checks: true      # validate context window before sending
  allowed_fails: 3                  # cool down a model after 3 failures in 1 min
  cooldown_time: 30                 # seconds to wait before retrying a cooled-down model
  redis_host: redis                 # share routing state across restarts via existing Redis
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD
  fallbacks:
    # Degrade by role capability — never expose backend model names externally
    - {"reasoner": ["coder"]}
    - {"supervisor": ["reasoner"]}
    - {"coder": ["router"]}
  context_window_fallbacks:
    # Graceful fallback when a request exceeds a role's declared context window
    - {"reasoner": ["coder"]}
    - {"coder": ["router"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  background_health_checks: true    # required for health_check_interval to fire
  health_check_interval: 300
  max_parallel_requests: 1          # Apple Silicon: queue concurrent inference; never split GPU

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 3600                        # 1hr — embeddings are stable; chat benefits from longer window too
    supported_call_types:
      - acompletion
      - completion
      - aembedding
      - embedding                    # cache embed role calls — same text, same vector
