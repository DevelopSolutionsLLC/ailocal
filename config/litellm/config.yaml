# LiteLLM Proxy Configuration for ailocal
# Role-based routing — clients use ONLY these role names: router | reasoner | coder | supervisor | embed
# All backend model details are hidden behind roles. No direct model names are exposed externally.
#
# Required env vars (set in .env, passed via docker-compose):
#   LITELLM_MASTER_KEY  — auth key for the proxy (sk-... format)
#   DATABASE_URL        — postgres connection string
#   OLLAMA_URL          — http://host.docker.internal:11434
#   REDIS_PASSWORD      — redis auth password

model_list:

  # router — lightweight classifier and fast-response role
  - model_name: router
    litellm_params:
      model: ollama/qwen3:8b
      api_base: os.environ/OLLAMA_URL

  # reasoner — deep planning and decomposition role
  - model_name: reasoner
    litellm_params:
      model: ollama/deepseek-r1:32b
      api_base: os.environ/OLLAMA_URL

  # coder — implementation and generation role
  - model_name: coder
    litellm_params:
      model: ollama/qwen3.6:27b
      api_base: os.environ/OLLAMA_URL

  # supervisor — review, critique, and approval gate role
  - model_name: supervisor
    litellm_params:
      model: ollama/glm-4.7-flash
      api_base: os.environ/OLLAMA_URL

  # embed — semantic retrieval and memory role only
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_URL

router_settings:
  routing_strategy: least-busy
  num_retries: 2
  timeout: 300
  fallbacks:
    # Degrade by role capability — never expose backend model names externally
    - {"reasoner": ["coder"]}
    - {"supervisor": ["reasoner"]}
    - {"coder": ["router"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  health_check_interval: 300

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 60
