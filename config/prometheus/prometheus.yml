global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # LiteLLM proxy metrics — request counts, latencies, token usage per model
  # Exposed by LiteLLM at /metrics (Prometheus format).
  # LiteLLM requires auth on /metrics — key written to .bearer_token by install.sh.
  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/.bearer_token
