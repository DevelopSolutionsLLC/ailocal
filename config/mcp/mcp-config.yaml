# MCP Configuration for ailocal
#
# The GitHub MCP server (ghcr.io/github/github-mcp-server) is a STDIO process —
# it is NOT an HTTP service and cannot run as a persistent Docker container.
# It must be registered with your MCP client (Claude Code, Claude Desktop, VS Code).
#
# ── Claude Code (CLI) ─────────────────────────────────────────────────────────
#
# Run once to register. Uses Docker to pull and run the server on demand:
#
#   claude mcp add github \
#     --transport stdio \
#     -- docker run --rm -i \
#          -e GITHUB_PERSONAL_ACCESS_TOKEN="<your-token>" \
#          ghcr.io/github/github-mcp-server:latest
#
# ── Claude Desktop ────────────────────────────────────────────────────────────
#
# Edit: ~/Library/Application Support/Claude/claude_desktop_config.json
#
#   {
#     "mcpServers": {
#       "github": {
#         "command": "docker",
#         "args": [
#           "run", "--rm", "-i",
#           "-e", "GITHUB_PERSONAL_ACCESS_TOKEN=<your-token>",
#           "ghcr.io/github/github-mcp-server:latest"
#         ]
#       }
#     }
#   }
#
# ── Filesystem MCP (Claude Code built-in) ────────────────────────────────────
#
# Claude Code has a built-in filesystem MCP. No extra config needed.
# Scope it to your project:
#
#   claude mcp add filesystem \
#     --transport stdio \
#     -- npx -y @modelcontextprotocol/server-filesystem ~/Documents/Develop\ Solutions
#
# ── Token scopes needed ───────────────────────────────────────────────────────
#
# Minimum GitHub token scopes:
#   repo         — read/write repositories
#   read:org     — read organization membership
#   read:user    — read user profile
#
# Generate at: https://github.com/settings/tokens
# Store in: .env as GITHUB_PERSONAL_ACCESS_TOKEN (never commit .env)
