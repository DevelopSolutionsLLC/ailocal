networks:
  ailocal_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  openwebui_data:
  litellm_data:
  prometheus_data:
  grafana_data:

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:15.8-alpine
    container_name: ailocal_postgres
    restart: unless-stopped
    # postgres image requires running as its internal postgres uid (70 on alpine).
    # Do not override user here — the entrypoint drops privileges itself.
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - ailocal_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: ailocal_redis
    restart: unless-stopped
    # redis:alpine creates uid 999 (redis); drop all capabilities.
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # REDIS_PASSWORD is always generated by install.sh; requirepass is always set.
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    networks:
      - ailocal_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── AI Proxy ───────────────────────────────────────────────────────────────

  litellm:
    # Docs: https://docs.litellm.ai/docs/proxy/docker_quick_start
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ailocal_litellm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: >
      --config /app/config/config.yaml
      --port 4000
      --num_workers 8
    networks:
      - ailocal_net
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OLLAMA_URL=${OLLAMA_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORE_MODEL_IN_DB=True
    volumes:
      - litellm_data:/app/data
      - ./config/litellm:/app/config:ro
    ports:
      # Localhost-only. All ports bind to 127.0.0.1 per security spec.
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # /health/liveliness checks that the proxy process is up and accepting requests.
      # It does NOT require Ollama to be reachable — that is checked separately in
      # healthcheck.sh. Using /health here would block open-webui from starting if
      # Ollama isn't running at compose-up time.
      # curl is not in the LiteLLM image — use Python (always available).
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Web UI ─────────────────────────────────────────────────────────────────

  open-webui:
    # Official image: https://github.com/open-webui/open-webui
    image: ghcr.io/open-webui/open-webui:v0.5.20
    container_name: ailocal_openwebui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ailocal_net
    environment:
      # Route all completions through LiteLLM for unified routing and caching
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      # Also expose Ollama model list in the UI (model management)
      - OLLAMA_BASE_URL=${OLLAMA_URL}
      # Single-user local install: disable signup/login.
      # WARNING: If you expose this stack on a LAN (change port bind to 0.0.0.0),
      # set WEBUI_AUTH=true and configure a password. OWASP A07:2021.
      - WEBUI_AUTH=false
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Reverse Proxy ──────────────────────────────────────────────────────────

  caddy:
    image: caddy:2.9-alpine
    container_name: ailocal_caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NET_BIND_SERVICE allows a non-root process to bind to ports < 1024 (80, 443).
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - ailocal_net
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./logs/caddy:/var/log/caddy
    depends_on:
      - litellm
      - open-webui
    healthcheck:
      test: ["CMD-SHELL", "caddy version > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Observability ──────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: ailocal_prometheus
    restart: unless-stopped
    # prometheus image uses uid 65534 (nobody) internally.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ailocal_net
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus:/etc/prometheus:ro
    depends_on:
      - litellm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: ailocal_grafana
    restart: unless-stopped
    # Grafana image runs as uid 472 (grafana) by default.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ailocal_net
    environment:
      # Admin password from .env; grafana.ini must NOT hardcode admin_password.
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Mounts grafana.ini and provisioning/ (datasources auto-configured)
      - ./config/grafana:/etc/grafana:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Architecture Notes ─────────────────────────────────────────────────────
#
# Ollama MUST run natively on macOS for Apple Metal (GPU) acceleration.
# All Docker services reach Ollama via host.docker.internal:11434 ($OLLAMA_URL).
# Never containerize Ollama on Apple Silicon — it loses GPU access.
#
# Removed services:
#   qdrant      — nothing in this stack uses it; add back if you need vector search
#   mcp-server  — GitHub MCP server is a stdio process, not an HTTP service;
#                 configure it in Claude Desktop/Code via 'claude mcp add'
#                 (see config/mcp/mcp-config.yaml for setup instructions)
#
# Port binding: all ports use 127.0.0.1 prefix (localhost-only).
# To expose on LAN, change to 0.0.0.0 and add Caddy auth middleware.
# Also set WEBUI_AUTH=true in open-webui environment (OWASP A07:2021).
#
# LiteLLM healthcheck uses /health/liveliness (proxy alive) not /health (models ready).
# The /health endpoint returns 503 when Ollama is down, which would prevent open-webui
# from starting. Actual model availability is verified by healthcheck.sh.
#
# Dependency chain (all condition: service_healthy):
#   postgres, redis → litellm → open-webui → caddy
#                             → prometheus → grafana
#
# Security hardening applied (OWASP A05:2021):
#   - no-new-privileges:true on all containers
#   - cap_drop: ALL on containers that don't need Linux capabilities
#   - cap_add: NET_BIND_SERVICE only for Caddy (ports 80/443)
#   - postgres runs its own privilege-drop internally (not overridden)
