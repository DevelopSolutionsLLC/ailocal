networks:
  ailocal_net:
    driver: bridge

services:

  # ── AI Proxy (the only container) ──────────────────────────────────────────
  # Ollama runs NATIVELY on the host for Apple Metal (GPU) acceleration and is
  # reached via host.docker.internal:11434 ($OLLAMA_URL). All three clients —
  # Claude Code, Codex, VS Code Copilot Chat — point at this proxy on :4000.
  litellm:
    # Docs: https://docs.litellm.ai/docs/proxy/docker_quick_start
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ailocal_litellm
    restart: unless-stopped
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: >
      --config /app/config/config.yaml
      --port 4000
      --num_workers 1
    networks:
      - ailocal_net
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OLLAMA_URL=${OLLAMA_URL}
      # Optional cloud fallback — disabled unless you add a key AND uncomment a
      # cloud-backed model block in config/litellm/config.yaml.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./config/litellm:/app/config:ro
    ports:
      # Localhost-only per security spec.
      - "127.0.0.1:4000:4000"
    healthcheck:
      # /health/liveliness = proxy process is up. It does NOT require Ollama to
      # be reachable (that is checked by healthcheck.sh). curl is not in the
      # LiteLLM image, so use Python (always present).
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

# ── Architecture Notes ─────────────────────────────────────────────────────
#
# This stack is intentionally minimal: a single LiteLLM container in front of a
# host-native Ollama. That is everything needed to serve local models to Claude
# Code, Codex, and VS Code. LiteLLM runs with NO database and NO cache.
#
# Ollama MUST run natively on macOS for Apple Metal (GPU) acceleration.
# Never containerize Ollama on Apple Silicon — it loses GPU access.
#
# Port binding: 127.0.0.1 only (localhost). To expose on a LAN, change to
# 0.0.0.0 and put an authenticating reverse proxy in front — do not expose
# LiteLLM directly.
#
# Removed services (were unnecessary for local single-user agent use):
#   caddy       — reverse proxy; clients hit :4000 directly, so it did nothing
#   postgres    — only needed for spend logs / virtual keys / admin UI
#   redis       — response cache; near-zero hit rate for coding agents
#   open-webui  — browser chat UI; out of scope (use the 3 clients / smoke-test)
#   qdrant, mcp-server, prometheus, grafana — never used by this stack
#
# Security hardening (OWASP A05:2021): no-new-privileges + cap_drop ALL.
